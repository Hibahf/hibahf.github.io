<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V.I.S.I.O.N — Web Session</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0e0e0e;
    --surface:   #161616;
    --border:    #2a2a2a;
    --red:       #e63329;
    --red-dim:   #7a1a16;
    --red-bg:    #1e0d0c;
    --text:      #d4d4d4;
    --text-dim:  #5a5a5a;
    --green:     #3ddc84;
    --mono:      'Share Tech Mono', monospace;
    --ui:        'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    overflow: hidden;
  }

  .shell {
    display: grid;
    grid-template-rows: 44px 1fr 72px;
    height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    letter-spacing: 0.12em;
    font-family: var(--ui);
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    color: #888;
  }
  header .title { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 20px; }

  /* TTS toggle */
  .tts-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
  }
  .tts-toggle:hover { color: var(--text); }
  .tts-toggle input { display: none; }
  .toggle-track {
    width: 28px; height: 14px;
    border-radius: 7px;
    background: #333;
    position: relative;
    transition: background 0.2s;
  }
  .tts-toggle input:checked + .toggle-track { background: var(--red-dim); }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #666;
    top: 2px; left: 2px;
    transition: transform 0.2s, background 0.2s;
  }
  .tts-toggle input:checked + .toggle-track::after {
    transform: translateX(14px);
    background: var(--red);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--green);
    font-size: 11px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ── Messages ── */
  .messages {
    overflow-y: auto;
    padding: 28px 24px 12px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: fadeUp 0.25s ease both;
  }
  .row.user { flex-direction: row-reverse; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    font-family: var(--ui);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .row.user .avatar { background: #2e2e2e; color: #888; }

  .bubble-wrap { display: flex; flex-direction: column; gap: 5px; max-width: 62%; }
  .row.user .bubble-wrap { align-items: flex-end; }

  .bubble {
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 2px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    position: relative;
  }
  .row.user .bubble {
    background: var(--red-bg);
    border-color: var(--red-dim);
    color: #ccc;
    text-align: right;
  }

  /* bubble footer: timestamp + speaker */
  .bubble-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .row.user .bubble-meta { flex-direction: row-reverse; }

  .ts {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* speaker replay button */
  .btn-speak {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1;
    transition: color 0.2s;
    display: flex;
    align-items: center;
  }
  .btn-speak:hover { color: var(--red); }
  .btn-speak.playing { color: var(--red); animation: pulse 0.8s ease-in-out infinite; }

  /* typing indicator */
  .typing .bubble {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: blink 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40%          { opacity: 1;   transform: scale(1); }
  }

  /* ── Input bar ── */
  footer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 0 0 20px;
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.03em;
    padding: 22px 0;
    caret-color: var(--red);
  }
  #msg-input::placeholder { color: var(--text-dim); }
  #msg-input:disabled { opacity: 0.4; }

  .input-actions {
    display: flex;
    align-items: stretch;
    gap: 0;
    height: 100%;
  }

  /* Mic button — shared base style */
  .btn-mic {
    background: transparent;
    border: none;
    border-left: 1px solid var(--border);
    color: #555;
    padding: 0 18px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--ui);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .btn-mic .mic-icon { font-size: 15px; }
  .btn-mic:hover { color: var(--red); }

  /* recording state */
  .btn-mic.recording {
    color: var(--red);
    background: rgba(230,51,41,0.08);
  }
  .btn-mic.recording .mic-label::after {
    content: '...';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }

  .btn-send {
    background: var(--red);
    border: none;
    color: #fff;
    font-family: var(--ui);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0 28px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-send:hover { background: #c22b22; }
  .btn-send:active { opacity: 0.8; }
  .btn-send:disabled { opacity: 0.4; cursor: default; }
  .btn-send svg { width: 12px; height: 12px; }

  /* scan-line overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.06) 2px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <span class="title">V.I.S.I.O.N — Web Session</span>
    <div class="header-right">
      <!-- TTS on/off toggle -->
      <label class="tts-toggle" title="Toggle AI voice output">
        <input type="checkbox" id="tts-toggle" checked />
        <span class="toggle-track"></span>
        AI VOICE
      </label>
      <span class="status"><span class="status-dot"></span>ACTIVE</span>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <footer>
    <input id="msg-input" type="text" placeholder="Ask V.I.S.I.O.N anything —" autocomplete="off" />
    <div class="input-actions">
      <button class="btn-mic" id="mic-btn" title="Hold to speak">
        <span class="mic-icon">🎙</span>
        <span class="mic-label" id="mic-label">SPEAK</span>
      </button>
      <button class="btn-send" id="send-btn">
        SEND
        <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 6h10M6 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </footer>

</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const micBtn      = document.getElementById('mic-btn');
  const micLabel    = document.getElementById('mic-label');
  const ttsToggle   = document.getElementById('tts-toggle');

  /* ─────────────────────────────────────────
     Helpers
  ───────────────────────────────────────── */
  function timestamp() {
    return new Date().toTimeString().slice(0, 8);
  }

  function setInputBusy(busy) {
    inputEl.disabled  = busy;
    sendBtn.disabled  = busy;
    micBtn.disabled   = busy;
  }

  /* ─────────────────────────────────────────
     Audio playback (ElevenLabs base64 MP3)
  ───────────────────────────────────────── */
  let currentAudio = null;

  function playAudioB64(b64, speakBtn) {
    // stop anything already playing
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }

    const audio = new Audio('data:audio/mp3;base64,' + b64);
    currentAudio = audio;

    if (speakBtn) speakBtn.classList.add('playing');
    audio.play().catch(e => console.warn('Audio play error:', e));
    audio.onended = () => {
      if (speakBtn) speakBtn.classList.remove('playing');
      currentAudio = null;
    };
  }

  /* ─────────────────────────────────────────
     Message rendering
  ───────────────────────────────────────── */
  function addMessage(text, role, audioB64) {
    const isUser = role === 'user';
    const row = document.createElement('div');
    row.className = 'row' + (isUser ? ' user' : '');

    // avatar
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = isUser ? 'U' : 'VI';

    // bubble wrapper
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    // bubble text
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    // meta row (timestamp + optional speaker)
    const meta = document.createElement('div');
    meta.className = 'bubble-meta';

    const ts = document.createElement('div');
    ts.className = 'ts';
    ts.textContent = timestamp();
    meta.appendChild(ts);

    // speaker button — only for assistant messages that have audio
    if (!isUser && audioB64) {
      const spk = document.createElement('button');
      spk.className = 'btn-speak';
      spk.title = 'Replay audio';
      spk.textContent = '🔊';
      spk.addEventListener('click', () => playAudioB64(audioB64, spk));
      meta.appendChild(spk);
    }

    wrap.appendChild(bubble);
    wrap.appendChild(meta);
    row.appendChild(av);
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'row typing';
    row.id = 'typing-indicator';
    row.innerHTML = `
      <div class="avatar">VI</div>
      <div class="bubble-wrap">
        <div class="bubble">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  /* ─────────────────────────────────────────
     Send message → backend → response + TTS
  ───────────────────────────────────────── */
  async function sendMessage(text) {
    text = text.trim();
    if (!text) return;

    inputEl.value = '';
    addMessage(text, 'user');
    showTyping();
    setInputBusy(true);

    try {
      const res = await fetch('http://localhost:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, tts: ttsToggle.checked })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      removeTyping();

      // Show the text bubble (pass audio if present)
      addMessage(data.response, 'assistant', data.audio || null);

      // Auto-play if AI VOICE toggle is on and we got audio
      if (ttsToggle.checked && data.audio) {
        // find the speaker btn in the last assistant row and trigger it
        const rows = messagesEl.querySelectorAll('.row:not(.user)');
        const lastRow = rows[rows.length - 1];
        const spk = lastRow ? lastRow.querySelector('.btn-speak') : null;
        playAudioB64(data.audio, spk);
      }

    } catch (err) {
      removeTyping();
      addMessage('[Connection error — is server.py running on port 8000?]', 'assistant');
      console.error(err);
    } finally {
      setInputBusy(false);
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) sendMessage(inputEl.value);
  });

  /* ─────────────────────────────────────────
     Voice INPUT — Web Speech API
     Click to start, click again (or auto-end) to stop & send
  ───────────────────────────────────────── */
  let recognition  = null;
  let isRecording  = false;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SR) {
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = true;   // show live transcript in input box
    recognition.continuous = false;

    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      micLabel.textContent = 'LISTENING';
      inputEl.placeholder = 'Listening…';
    };

    recognition.onresult = e => {
      const interim = Array.from(e.results)
        .map(r => r[0].transcript)
        .join('');
      inputEl.value = interim;

      // If the last result is final, send immediately
      if (e.results[e.results.length - 1].isFinal) {
        recognition.stop();
        sendMessage(interim);
      }
    };

    recognition.onerror = e => {
      console.warn('Speech error:', e.error);
      stopRecording();
    };

    recognition.onend = () => stopRecording();

  } else {
    // No Speech API — disable mic button
    micBtn.title = 'Speech recognition not supported in this browser';
    micBtn.style.opacity = '0.3';
    micBtn.style.cursor = 'not-allowed';
  }

  function stopRecording() {
    isRecording = false;
    micBtn.classList.remove('recording');
    micLabel.textContent = 'SPEAK';
    inputEl.placeholder = 'Ask V.I.S.I.O.N anything —';
  }

  micBtn.addEventListener('click', () => {
    if (!recognition) return;
    if (isRecording) {
      recognition.stop();
    } else {
      inputEl.value = '';
      recognition.start();
    }
  });

  /* ─────────────────────────────────────────
     Boot message (no TTS on init)
  ───────────────────────────────────────── */
  window.addEventListener('DOMContentLoaded', () => {
    addMessage(
      'V.I.S.I.O.N Web initialized. Perception and reasoning modules online. How can I help you today?',
      'assistant'
    );
  });
</script>
</body>
</html>
